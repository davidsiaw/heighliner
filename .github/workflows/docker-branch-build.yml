name: docker-branch-build

'on':
  push:
    branches:
    - '*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: extract_branch
      shell: bash
      run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
      id: extract_branch
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PAT }}
    - name: Build and push
      run: |
        docker build . -t davidsiaw/heighliner:branch-${{ steps.extract_branch.outputs.branch }}
        docker push davidsiaw/heighliner:branch-${{ steps.extract_branch.outputs.branch }}
