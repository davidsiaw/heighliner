name: docker

'on':
  push:
    branches:
    - '*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PAT }}
    - name: Build and push (branch)
      run: |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t davidsiaw/heighliner:branch-${{ github.ref_name }} \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --push \
          .
    - name: Build and push (latest)
      if: github.ref == 'refs/heads/master'
      run: |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t davidsiaw/heighliner:latest \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --push \
          .
    # bin/version reads the gem version (e.g. 1.2.3) so we get a pinned, reproducible tag alongside latest
    - name: Build and push (version tag)
      if: github.ref == 'refs/heads/master'
      run: |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t davidsiaw/heighliner:$(bin/version) \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --push \
          .
