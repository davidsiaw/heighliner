---
name: docker
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    -
      name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: degicadev
        password: ${{ secrets.DOCKERHUB_PAT }}
    - name: setup
      run: |-
        docker build . -t davidsiaw/heighliner:latest
        docker push davidsiaw/heighliner:latest
        docker build . -t davidsiaw/heighliner:`bin/version`
        docker push davidsiaw/heighliner:`bin/version`

'on':
  push:
    branches:
    - 'master'