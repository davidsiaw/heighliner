name: docs

'on':
  push:
    branches:
    - master

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
        working-directory: docs
    - name: Build documentation
      run: bundle exec weaver build
      working-directory: docs
    - name: Clean up build artifacts
      run: rm -rf docs/build/js/MathJax
    - name: Upload documentation
      id: upload
      uses: actions/upload-pages-artifact@v5
      with:
        path: docs/build

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.upload.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
